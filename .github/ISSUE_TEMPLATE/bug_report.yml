name: Bug report
description: Report a bug in AIOStreams itself
title: 'bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: >-
        **Before you file:** AIOStreams aggregates other addons, debrid/usenet services and
        proxies. If the problem also occurs when using that addon or service directly (without
        AIOStreams), it is not an AIOStreams bug — report it to the upstream project instead.
        For setup help and questions, use
        [Discussions](https://github.com/Viren070/AIOStreams/discussions/categories/help) or
        [Discord](https://discord.viren070.me), not the issue tracker.

        Reports that skip the required information below are likely to be closed without
        investigation.
  - type: input
    id: 'addonVersion'
    attributes:
      label: Version
      description: >-
        The exact version shown in the footer of the configuration page (or the commit hash for
        nightly/source builds). "Latest" is not a version.
      placeholder: v2.31.1 or 2026.07.15.1234-nightly
    validations:
      required: true
  - type: dropdown
    id: 'deployment'
    attributes:
      label: Deployment
      description: >-
        How is the instance you saw the bug on hosted? If you use a public instance you do not
        operate, some limits and behaviours are set by that instance's operator, not by
        AIOStreams.
      options:
        - Public instance (ElfHosted public or another community instance)
        - Private ElfHosted instance
        - Self-hosted with Docker
        - Self-hosted from source
        - Other (specify in the description)
    validations:
      required: true
  - type: dropdown
    id: 'bugArea'
    attributes:
      label: Area
      description: Where does the problem show up? Pick the closest match.
      options:
        - Deployment or startup (install, Docker, environment variables, crashes on boot)
        - Configuration UI (saving, validation, login, import/export, templates, sync)
        - Stream results (an addon or built-in scraper returns no, wrong, or error results)
        - Stream selection (filtering, sorting, deduplication, limits, groups, expressions)
        - Stream details (resolution, quality, language, release group parsed wrongly)
        - Stream appearance (formatter output looks wrong)
        - Playback (a listed stream fails to play)
        - Wrong content (plays the wrong title, season, or episode)
        - Services (debrid/usenet account auth, cached/uncached status)
        - Native usenet engine (NNTP streaming, usenet library, usenet dashboard)
        - Catalogs and metadata (catalogs, posters, meta pages, subtitles)
        - Proxy (MediaFlow, StreamProxy, built-in proxy)
        - Other or not sure
    validations:
      required: true
  - type: textarea
    id: 'bugDescription'
    attributes:
      label: Bug description and steps to reproduce
      description: >-
        What happens, what you expected instead, and the exact steps to make it happen (which
        title/episode you requested, what you clicked). Avoid vague descriptions like "doesn't
        work".
    validations:
      required: true
  - type: input
    id: 'upstreamSource'
    attributes:
      label: Which addon or service is involved?
      description: >-
        For stream/playback issues — the upstream addon (Torrentio, Comet, MediaFusion, a
        built-in scraper, ...) and service (RealDebrid, TorBox, ...) the failing stream came
        from. Shown on the stream itself in most formatters.
      placeholder: Comet + TorBox
  - type: textarea
    id: 'exactData'
    attributes:
      label: Exact filenames or stream data
      description: >-
        Required for parsing, filtering, sorting and formatting issues — paste the EXACT
        filename(s) or release title(s) as text, not a screenshot of your formatted stream list.
        A custom formatter can hide fields that were parsed correctly, so retest with a built-in
        formatter before reporting parsing bugs.
      render: text
  - type: textarea
    id: 'configExport'
    attributes:
      label: Configuration export
      description: >-
        Export your config from the Save & Install page with credentials excluded, then check it
        by hand: the exclusion only strips service credentials, so remove any API keys or
        passwords embedded in addon URLs or option fields before posting. Issues that depend on
        configuration and don't include a usable export are likely to be closed as needs-info.
      render: json
    validations:
      required: true
  - type: textarea
    id: 'logs'
    attributes:
      label: Logs
      description: >-
        Self-hosted: server logs of the failing request, ideally with LOG_LEVEL=debug, plus
        proxy (MediaFlow/StreamProxy) logs if a proxy is involved. Public instance: the exact
        time (with timezone) and the full text of any error shown in Stremio or as an error
        stream.
      render: shell
  - type: input
    id: 'deviceInfo'
    attributes:
      label: Device / client
      description: >-
        For playback and client-side issues — device, OS, Stremio (or other client) version.
      placeholder: Samsung TV (Tizen 7), Stremio 5.1
  - type: checkboxes
    id: 'isolation'
    attributes:
      label: What I ruled out
      description: >-
        Tick everything that applies. These checks are how you tell an AIOStreams bug apart
        from an upstream or configuration problem — reports where the applicable checks are
        missing will usually be closed as external or needs-info.
      options:
        - label: >-
            The problem does NOT occur when using the upstream addon/service directly, without
            AIOStreams (or no upstream is involved).
        - label: >-
            Playback issues — I tested on a second device/player and it fails there too.
        - label: >-
            I retested with my stream expressions, regex filters, groups and catalog
            modifications disabled (where applicable) and the problem persists.
        - label: >-
            I retested with the proxy (MediaFlow/StreamProxy/built-in) disabled (where
            applicable) and the problem persists.
  - type: checkboxes
    id: 'issueChecklist'
    attributes:
      label: Issue checklist
      options:
        - label: >-
            I have written a short, informative title that describes the actual problem.
          required: true
        - label: >-
            I have searched open and closed issues and this is not a duplicate.
          required: true
        - label: >-
            I have reproduced this on the
            [latest release](https://github.com/Viren070/AIOStreams/releases/latest) (or a
            current nightly).
          required: true
        - label: >-
            I understand that issues missing the required information above may be closed
            without investigation.
          required: true
